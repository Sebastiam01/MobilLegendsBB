<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brackets Torneo</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; padding: 20px; text-align: center; }
        .bracket-container { display: flex; justify-content: center; align-items: center; gap: 40px; margin-top: 50px; }
        .column { display: flex; flex-direction: column; gap: 20px; }
        .matchup { background: #1e293b; border: 2px solid #eab308; width: 180px; border-radius: 8px; overflow: hidden; }
        .team { padding: 15px; cursor: pointer; border-bottom: 1px solid #334155; font-weight: bold; }
        .team:last-child { border-bottom: none; }
        .team:hover { background: #334155; }
        .winner { background: #10b981 !important; color: #000; }
        .final-box { border-color: #3b82f6; }
    </style>
</head>
<body>
    <h1>⚔️ Brackets Mobile Legends</h1>
    <p>Haz clic en el equipo que ganó para que avance</p>

    <div class="bracket-container" id="visual"></div>
    <br>
    <a href="index.html" style="color:gray; text-decoration:none;">⬅ Volver</a>

    <script>
        let sorteo = JSON.parse(localStorage.getItem('torneo_sorteo'));
        let fase2 = JSON.parse(localStorage.getItem('ganadores_fase2')) || ["GANADOR A", "GANADOR B"];
        let campeon = localStorage.getItem('campeon_final') || "CAMPEÓN";

        dibujar();

        function dibujar() {
            const v = document.getElementById('visual');
            v.innerHTML = "";
            if(!sorteo) { v.innerHTML = "No hay sorteo generado aún."; return; }

            // COLUMNA 1 (Sorteados)
            const col1 = document.createElement('div'); col1.className = "column";
            for(let i=0; i < sorteo.length; i+=2) {
                const e1 = sorteo[i].nombre;
                const e2 = sorteo[i+1] ? sorteo[i+1].nombre : "BYE";
                col1.innerHTML += `
                    <div class="matchup">
                        <div class="team" onclick="avanzar(1, ${i/2}, '${e1}')">${e1}</div>
                        <div class="team" onclick="avanzar(1, ${i/2}, '${e2}')">${e2}</div>
                    </div>`;
            }

            // COLUMNA 2 (Semifinales)
            const col2 = document.createElement('div'); col2.className = "column";
            col2.innerHTML = `
                <div class="matchup">
                    <div class="team" onclick="avanzar(2, 0, '${fase2[0]}')">${fase2[0]}</div>
                    <div class="team" onclick="avanzar(2, 0, '${fase2[1]}')">${fase2[1]}</div>
                </div>`;

            // COLUMNA 3 (Final)
            const col3 = document.createElement('div'); col3.className = "column";
            col3.innerHTML = `
                <div class="matchup final-box">
                    <div class="team winner">${campeon}</div>
                </div>`;

            v.appendChild(col1);
            v.appendChild(col2);
            v.appendChild(col3);
        }

        function avanzar(fase, idx, nombre) {
            if(nombre.includes("GANADOR") || nombre === "BYE") return;
            
            if(fase === 1) {
                fase2[idx] = nombre;
                localStorage.setItem('ganadores_fase2', JSON.stringify(fase2));
            } else if(fase === 2) {
                campeon = nombre;
                localStorage.setItem('campeon_final', campeon);
            }
            dibujar();
        }
    </script>
</body>
</html>
