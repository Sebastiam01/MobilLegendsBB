<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro MLBB</title>
    <style>
        :root { --gold: #eab308; --blue: #3b82f6; --dark: #0f172a; --card: #1e293b; }
        body { font-family: sans-serif; background: var(--dark); color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .admin-access { position: fixed; top: 15px; right: 15px; font-size: 24px; cursor: pointer; background: var(--card); padding: 8px; border-radius: 50%; border: 1px solid var(--gold); }
        .card { background: var(--card); padding: 20px; border-radius: 12px; text-align: left; border: 1px solid #334155; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; }
        .btn-primary { width: 100%; padding: 15px; background: #10b981; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #16213e; padding: 30px; border-radius: 15px; width: 85%; max-width: 400px; border: 1px solid var(--gold); }
        .btn-sorteo { background: #8b5cf6; color: white; padding: 15px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="admin-access" onclick="document.getElementById('modalAdmin').style.display='flex'">🔐</div>

    <div class="container">
        <h1>🏆 Registro Torneo</h1>
        <div class="card">
            <input type="text" id="nombreEquipo" placeholder="Nombre Equipo">
            <input type="text" id="capitan" placeholder="Capitán">
            <button class="btn-primary" onclick="guardarEquipo()">REGISTRAR EQUIPO</button>
            <p id="contador" style="text-align:center; color:var(--gold); font-weight:bold;"></p>
        </div>
        <br>
        <a href="brackets.html" id="linkB" style="display:none; color:cyan; font-weight:bold; text-decoration:none;">➡️ IR A LOS BRACKETS</a>
    </div>

    <div id="modalAdmin" class="modal-overlay">
        <div class="modal-content">
            <span onclick="document.getElementById('modalAdmin').style.display='none'" style="float:right; cursor:pointer;">&times;</span>
            <div id="login-admin">
                <h3>Admin</h3>
                <input type="password" id="pass" placeholder="Clave (1234)">
                <button onclick="login()" class="btn-primary">Entrar</button>
            </div>
            <div id="panel-cont" style="display:none;">
                <button id="btnSort" class="btn-sorteo" onclick="ejecutarSorteo()">🔀 GENERAR SORTEO</button>
                <a href="brackets.html" class="btn-sorteo" style="display:block; text-decoration:none; text-align:center; background:#3b82f6;">🖥️ VER PANTALLA GRANDE</a>
                <button onclick="localStorage.clear(); location.reload();" style="background:red; color:white; border:none; padding:5px; margin-top:20px; cursor:pointer; font-size:10px;">BORRAR TODO</button>
            </div>
        </div>
    </div>

    <script>
        let equipos = JSON.parse(localStorage.getItem('torneo_equipos')) || [];
        document.getElementById('contador').innerText = `Equipos inscritos: ${equipos.length}`;
        if(localStorage.getItem('torneo_sorteo')) document.getElementById('linkB').style.display = 'block';

        function guardarEquipo() {
            const n = document.getElementById('nombreEquipo').value;
            const c = document.getElementById('capitan').value;
            if(!n || !c) return alert("Faltan datos");
            equipos.push({nombre: n, capitan: c});
            localStorage.setItem('torneo_equipos', JSON.stringify(equipos));
            document.getElementById('nombreEquipo').value = "";
            document.getElementById('capitan').value = "";
            document.getElementById('contador').innerText = `Equipos inscritos: ${equipos.length}`;
            alert("¡Equipo guardado!");
        }

        function login() {
            if(document.getElementById('pass').value === "1234") {
                document.getElementById('login-admin').style.display = 'none';
                document.getElementById('panel-cont').style.display = 'block';
            }
        }

        function ejecutarSorteo() {
            if(equipos.length < 2) return alert("Mínimo 2 equipos");
            let mezclados = [...equipos].sort(() => Math.random() - 0.5);
            // Guardamos la lista mezclada directamente
            localStorage.setItem('torneo_sorteo', JSON.stringify(mezclados));
            // También reiniciamos los ganadores de las fases siguientes por si acaso
            localStorage.removeItem('ganadores_fase2');
            localStorage.removeItem('campeon_final');
            alert("¡Sorteo Generado!");
            location.reload(); 
        }
    </script>
</body>
</html>
