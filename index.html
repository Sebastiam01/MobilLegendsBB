<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo MLBB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-access" onclick="abrirModal()">🔐</div>

    <div class="container">
        <header>
            <h1>🏆 Mobile Legends: Torneo</h1>
            <p>Inscribe a tu equipo y participa por la gloria</p>
        </header>

        <div class="card">
            <h2>📝 Registro de Equipo</h2>
            <div class="input-group">
                <input type="text" id="nombreEquipo" placeholder="Nombre del Equipo">
                <input type="text" id="capitan" placeholder="Nombre del Capitán">
            </div>

            <div class="jugador-form">
                <h3>Añadir Integrantes</h3>
                <div class="row">
                    <input type="text" id="nombreJugador" placeholder="Nombre Jugador">
                    <input type="text" id="idJugador" placeholder="ID del Juego">
                    <button class="btn-add" onclick="agregarJugadorATabla()">+</button>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Jugador</th>
                                <th>ID</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla">
                            </tbody>
                    </table>
                </div>
            </div>
            <button class="btn-primary" onclick="confirmarRegistro()">Confirmar Registro Total</button>
        </div>
    </div>

    <div id="modalAdmin" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <span class="close-btn" onclick="cerrarModal()">&times;</span>
            
            <div id="login-form">
                <h3>Acceso Administrador</h3>
                <input type="password" id="adminPass" placeholder="Contraseña">
                <button onclick="accederAdmin()">Entrar</button>
            </div>

            <div id="admin-panel" style="display:none;">
                <h2>⚙️ Gestión del Torneo</h2>
                <button class="btn-action" onclick="generarBracketVisual()">Generar Sorteo</button>
                <button class="btn-danger" onclick="limpiarTodo()">Borrar Todo</button>
                
                <div id="bracket-container" class="bracket-view"></div>
                
                <h3>Equipos Inscritos</h3>
                <div id="lista-confirmados"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
